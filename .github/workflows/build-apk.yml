name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    env:
      BUILDOZER_WARN_ON_ROOT: "1"
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build APK
      run: |
        set -o pipefail
        yes | buildozer -v android debug 2>&1 | tee build_log.txt

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: livecontrol-apk
        path: bin/*.apk
        if-no-files-found: ignore
        retention-days: 30

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build_log.txt
        if-no-files-found: ignore
        retention-days: 7
