name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq openjdk-17-jdk autoconf automake libtool pkg-config zlib1g-dev libncurses-dev libffi-dev libssl-dev ccache git zip unzip texinfo

    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer Cython==0.29.36

    - name: Build APK
      run: |
        set -o pipefail
        buildozer -v android debug 2>&1 | tee build_log.txt
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
        ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        BUILDOZER_WARN_ON_ROOT: "1"
        ACLOCAL_PATH: /usr/share/aclocal

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: livecontrol-apk
        path: bin/*.apk
        if-no-files-found: ignore
        retention-days: 30

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: |
          build_log.txt
          .buildozer/android/platform/build-arm64-v8a/build/python-for-android-*/python-for-android/build_logs/
        if-no-files-found: ignore
        retention-days: 7
